# version: '3.9'

services:

  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: eduspace_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-eduspace_db}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduspace_net

  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduspace_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        4000
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME:-eduspace_db}
      DB_USER:     ${DB_USER:-eduspace}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      JWT_SECRET:              ${JWT_SECRET:-change_this_secret}
      JWT_EXPIRES_IN:          ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET:      ${JWT_REFRESH_SECRET:-change_this_refresh}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-30d}
      GOOGLE_CLIENT_ID:        ${GOOGLE_CLIENT_ID}
      GMAIL_USER:              ${GMAIL_USER}
      GMAIL_APP_PASSWORD:      ${GMAIL_APP_PASSWORD}
      GMAIL_FROM_NAME:         ${GMAIL_FROM_NAME:-EduSpace}
      FRONTEND_URL:            ${FRONTEND_URL:-http://localhost:5173}
      APP_URL:                 ${APP_URL:-http://localhost:4000}
      UPLOAD_DIR:              uploads
      MAX_FILE_SIZE_MB:        ${MAX_FILE_SIZE_MB:-100}
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - eduspace_net

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: eduspace_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:80"
    networks:
      - eduspace_net

volumes:
  db_data:
  uploads_data:

networks:
  eduspace_net:
    driver: bridge
